<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF 工具</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      </div>
      <h1>PDF 工具</h1>
      <p class="subtitle">PDF ⇄ Word 互转 · PDF 压缩</p>
    </header>

    <div class="operations" id="operations">
      <div class="card" data-op="pdf2word" onclick="selectOp('pdf2word')">
        <div class="card-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        </div>
        <h3>PDF → Word</h3>
        <p>将 PDF 转换为可编辑的 Word 文档</p>
      </div>
      <div class="card" data-op="word2pdf" onclick="selectOp('word2pdf')">
        <div class="card-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        </div>
        <h3>Word → PDF</h3>
        <p>将 Word 文档转换为 PDF 格式</p>
      </div>
      <div class="card" data-op="compress" onclick="selectOp('compress')">
        <div class="card-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>
        </div>
        <h3>压缩 PDF</h3>
        <p>压缩 PDF 文件减小体积</p>
      </div>
    </div>

    <div class="upload-zone" id="uploadZone" style="display:none">
      <div class="upload-inner" id="uploadInner">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <p class="upload-text">拖拽文件到此处，或 <span class="link">点击选择文件</span></p>
        <p class="upload-hint" id="uploadHint">支持 PDF、DOCX 格式，最大 10MB</p>
        <input type="file" id="fileInput" accept=".pdf,.docx" hidden>
      </div>
    </div>

    <div class="panel" id="optionsPanel" style="display:none">
      <div class="file-info" id="fileInfo"></div>
      <div id="compressOptions" style="display:none">
        <label class="label">压缩等级</label>
        <div class="level-group">
          <label class="level-option">
            <input type="radio" name="level" value="light" onchange="setLevel('light')">
            <span>轻度</span>
          </label>
          <label class="level-option">
            <input type="radio" name="level" value="balanced" checked onchange="setLevel('balanced')">
            <span>均衡</span>
          </label>
          <label class="level-option">
            <input type="radio" name="level" value="maximum" onchange="setLevel('maximum')">
            <span>最大</span>
          </label>
        </div>
        <div class="level-desc" id="levelDesc">均衡模式 - 在体积和质量之间取得平衡，推荐</div>
      </div>
      <button class="btn btn-primary" id="processBtn" onclick="processFile()">
        <span class="btn-text" id="btnText">开始处理</span>
        <div class="spinner" id="spinner" style="display:none"></div>
      </button>
    </div>

    <div class="panel" id="resultPanel" style="display:none">
      <div class="result-icon" id="resultIcon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      </div>
      <h3 class="result-title" id="resultTitle">处理完成</h3>
      <div class="result-details" id="resultDetails"></div>
      <a class="btn btn-download" id="downloadBtn" download>下载文件</a>
      <p class="countdown" id="countdown"></p>
      <button class="btn btn-secondary" onclick="resetAll()">重新开始</button>
    </div>

    <div class="error-toast" id="errorToast" style="display:none">
      <span id="errorMsg"></span>
    </div>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
